name: build-binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Stage binary + checksum
        shell: bash
        run: |
          mkdir -p dist
          cp "build/Release/fastchm.exe" "dist/fastchm-windows-x86_64.exe"
          cd dist
          sha256sum fastchm-windows-x86_64.exe > fastchm-windows-x86_64.exe.sha256
          cat fastchm-windows-x86_64.exe.sha256

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/fastchm-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastchm-windows-x86_64
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fastchm-windows-x86_64.exe
            dist/fastchm-windows-x86_64.exe.sha256
